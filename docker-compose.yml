version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: appraisal-postgres
    environment:
      POSTGRES_DB: appraisaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
